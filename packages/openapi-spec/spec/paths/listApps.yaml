get:
  summary: List all apps
  operationId: listApps
  tags:
    - Apps
  parameters:
    - $ref: "../parameters/category.yaml"
    - $ref: "../parameters/author.yaml"
    - $ref: "../parameters/license.yaml"
    - $ref: "../parameters/service.yaml"
    - $ref: "../parameters/q.yaml"
    - $ref: "../parameters/capability.yaml"
    - $ref: "../parameters/vid.yaml"
    - $ref: "../parameters/pid.yaml"
    - $ref: "../parameters/frontboard.yaml"
    - $ref: "../parameters/codes.yaml"
  responses:
    "200":
      description: A list of apps
      content:
        application/json:
          schema:
            type: object
            properties:
              items:
                type: array
                items:
                  $ref: "../schemas/apps/App.yaml"
              count:
                type: integer
                description: The total number of apps available
