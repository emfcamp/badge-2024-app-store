get:
  summary: List all apps
  operationId: listApps
  tags:
    - Apps
  parameters:
    - name: category
      in: query
      required: false
      description: Filter by category (comma-separated). e.g. `Games,Apps`
      schema:
        type: string
    - name: author
      in: query
      required: false
      description: Filter by author (comma-separated). e.g. `pikesley`
      schema:
        type: string
    - name: license
      in: query
      required: false
      description: Filter by license (comma-separated). e.g. `MIT`
      schema:
        type: string
    - name: service
      in: query
      required: false
      description: Filter by registry service (comma-separated). e.g. `github,codeberg`
      schema:
        type: string
    - name: q
      in: query
      required: false
      description: Free-text search across app name and description
      schema:
        type: string
    - name: capability
      in: query
      required: false
      description: Filter by required capability. Repeat for AND logic. e.g. `?capability=MOTOR&capability=LED`
      schema:
        type: string
    - name: vid
      in: query
      required: false
      description: Filter by hexpansion vendor ID
      schema:
        type: string
    - name: pid
      in: query
      required: false
      description: Filter by hexpansion product ID
      schema:
        type: string
    - name: frontboard
      in: query
      required: false
      description: Filter by frontboard name
      schema:
        type: string
  responses:
    "200":
      description: A list of apps
      content:
        application/json:
          schema:
            type: object
            properties:
              items:
                type: array
                items:
                  $ref: "../schemas/apps/App.yaml"
              count:
                type: integer
                description: The total number of apps available
