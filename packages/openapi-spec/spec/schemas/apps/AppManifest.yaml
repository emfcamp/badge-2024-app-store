title: AppManifest
description: The author-provided app manifest (tildagon.toml or tildagon.json)
properties:
  app:
    type: object
    description: The app's manifest
    properties:
      name:
        type: string
        description: The name of the app
      category:
        type: array
        description: One or more categories for the app
        items:
          type: string
          enum:
            - Badge
            - Music
            - Media
            - Apps
            - Games
            - Background
            - Pattern
    required:
      - name
      - category
  metadata:
    type: object
    properties:
      author:
        type: string
        description: The author of the app
      license:
        type: string
        description: The license of the app
      url:
        type: string
        format: uri
        description: The URL of the app's homepage
      description:
        type: string
        description: A short description of the app
      version:
        type: string
        description: The version of the app
      capabilities:
        type: array
        description: Hardware capabilities required or provided by this app
        items:
          type: object
          properties:
            feature:
              description: A string capability name, or a hexpansion/frontboard identifier
    required:
      - author
      - license
      - url
      - description
      - version
