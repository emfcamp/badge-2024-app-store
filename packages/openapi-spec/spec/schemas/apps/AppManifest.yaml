title: AppManifest
description: The author-provided app manifest (tildagon.toml or tildagon.json)
type: object
properties:
  app:
    type: object
    description: The app's identity and classification
    properties:
      name:
        type: string
        description: The name of the app
      category:
        type: array
        description: One or more categories for the app
        items:
          type: string
          enum:
            - Badge
            - Music
            - Media
            - Apps
            - Games
            - Background
            - Pattern
    required:
      - name
      - category
  metadata:
    type: object
    properties:
      author:
        type: string
        description: The author of the app
      license:
        type: string
        description: The license of the app
      url:
        type: string
        format: uri
        description: The URL of the app's homepage
      description:
        type: string
        description: A short description of the app
      version:
        type: string
        description: The version of the app
      capabilities:
        type: array
        description: Hardware/software capability associations for this app (required or supported)
        items:
          type: object
          properties:
            required:
              type: boolean
              description: Whether this capability is required (true) or merely supported (false)
            feature:
              oneOf:
                - $ref: "./Capability.yaml"
                - $ref: "./HexpansionDefinition.yaml"
                - $ref: "./FrontboardIdentifier.yaml"
                - $ref: "./TildagonOSMinimumVersion.yaml"
          required:
            - required
            - feature
      providedCapabilities:
        type: array
        description: Capabilities that this app provides to other apps
        items:
          type: object
          properties:
            type:
              type: string
              enum:
                - ProvidedCapability
            capability:
              $ref: "./Capability.yaml"
          required:
            - type
            - capability
    required:
      - author
      - license
      - url
      - description
      - version
