[tools]
node = "latest"

[env]
# Required for GitHub API access in the app directory API
GITHUB_TOKEN = ""

# Optional: Set to "true" to use mock data instead of real GitHub API
APP_STORE_MOCK = ""

# Optional: Port for the API server (default: 3000)
PORT = "3000"

# Optional: GitHub Actions workspace directory (used by dump_apps.ts script)
GITHUB_WORKSPACE = ""

# Optional: Base URL for the site (Astro built-in, typically set via astro.config.mjs)
BASE_URL = "/"

# Optional: CI environment flag (set automatically by CI systems)
CI = "false"

[tasks.container-build]
description = "Run the container"
run = """podman build \
	--file Containerfile \
	--build-arg PROJECT=badge-2024-app-store \
  --tag emfcamp/badge-2024-app-store ."""

[tasks.container-run]
description = "Run the container"
run = """podman run \
	--name badge-2024-app-store \
	--hostname badge-2024-app-store \
	--volume $(shell pwd):/opt/badge-2024-app-store \
	--volume ${HOME}/.config:/root/.config \
	--interactive \
	--tty \
	--rm \
	--publish 3000:3000 \
	--publish 4321:4321 \
	emfcamp/badge-2024-app-store \
	bash"""

[tasks.container-exec]
description = "Get a shell in the container"
run = """ podman exec \
	--interactive \
	--tty \
	badge-2024-app-store \
	bash"""
