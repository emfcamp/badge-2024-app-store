[settings]
env_shell_expand = true

[tools]
node = "24"

[env]
GITHUB_TOKEN = { value = "${GITHUB_TOKEN:-}", redact = true }
APP_STORE_MOCK = true
PORT = "3000"
CACHE_DIR = "tmp/cache"

[tasks.check]
description = "Run all checks (types, prettier, lint)"
depends = ["check-types", "check-astro", "check-prettier", "check-eslint", "build-core"]

[tasks.test]
description = "Run all tests"
run = "npm test"

[tasks.check-types]
description = "Typecheck all packages"
depends = ["build-library", "build-spec", "build-core"]
run = "npm run --workspaces --if-present check-types"

[tasks.check-astro]
description = "Run astro check on the site"
run = "npm --workspace='tildagon-app-directory-site' run astro check"

[tasks.build-library]
description = "Build the tildagon-app library"
run = "npm --workspace='tildagon-app' run build"

[tasks.build-core]
description = "Build the tildagon-app-directory-core library"
depends = ["build-library"]
run = "npm --workspace='tildagon-app-directory-core' run build"

[tasks.build-spec]
description = "Build the OpenAPI spec"
run = "npm --workspace='openapi-spec' run build"

[tasks.build-website]
description = "Build the website"
depends = ["build-library", "build-core"]
run = "npm --workspace='tildagon-app-directory-site' run build"

[tasks.dev]
description = "Serve the website"
depends = ["build-library", "build-core"]
run = "npm --workspace='tildagon-app-directory-site' run dev"

[tasks.check-prettier]
description = "Check formatting with prettier"
run = "./node_modules/.bin/prettier --check '**/*.{ts,tsx,js,jsx,json,md,css,html,yaml,yml}'"

[tasks.prettier]
description = "Format all files with prettier"
run = "./node_modules/.bin/prettier --write '**/*.{ts,tsx,js,jsx,json,md,css,html,yaml,yml}'"

[tasks.check-eslint]
description = "Check for lint errors with eslint"
run = "./node_modules/.bin/eslint ."

[tasks.eslint]
description = "Lint and auto-fix with eslint"
run = "./node_modules/.bin/eslint --fix ."
